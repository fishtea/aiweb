# AI学习路径网站 - MkDocs配置
site_name: AI 学习路径导航
site_description: 最全面的AI学习资源库 - 从入门到精通，涵盖各大模型与工具
site_url: https://aiweb.vercel.app
repo_url: https://github.com/fishtea/aiweb
repo_name: fishtea/aiweb
edit_uri: ""

theme:
  name: material
  language: zh
  palette:
    # 白天模式
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: 切换深色模式
    # 夜间模式
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: 切换浅色模式
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - header.autohide
    - announce.dismiss
  icon:
    logo: material/bookshelf
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fishtea/aiweb
    - icon: fontawesome/brands/gitlab
      link: https://gitee.com/fishtea/aiweb
  generator: true
  copyright: >
    <a href="https://github.com/fishtea/aiweb">AI 学习路径导航</a> |
    每日自动更新 | 中英文资源全翻译为中文

extra_css:
  - assets/custom.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search:
      lang:
        - zh
        - en

nav:
  - 🏠 首页: index.md
  - 📚 初级知识:
    - 初级知识/index.md
    - 人工智能入门: 初级知识/人工智能入门/index.md
    - 机器学习基础: 初级知识/机器学习基础/index.md
    - 深度学习入门: 初级知识/深度学习入门/index.md
    - 大语言模型基础: 初级知识/大语言模型基础/index.md
  - 🔧 进阶学习:
    - 进阶学习/index.md
    - 模型微调技术: 进阶学习/模型微调技术/index.md
    - RAG检索增强: 进阶学习/RAG检索增强/index.md
    - Agent智能体: 进阶学习/Agent智能体/index.md
    - 提示词工程: 进阶学习/提示词工程/index.md
    - 模型评估与基准: 进阶学习/模型评估与基准/index.md
  - 🧠 高级知识:
    - 高级知识/index.md
    - 模型训练与优化: 高级知识/模型训练与优化/index.md
    - AI安全与对齐: 高级知识/AI安全与对齐/index.md
    - 多模态模型: 高级知识/多模态模型/index.md
    - 模型架构研究: 高级知识/模型架构研究/index.md
  - 🤖 模型专区:
    - 模型专区/index.md
    - GPT系列: 模型专区/GPT系列/index.md
    - Claude系列: 模型专区/Claude系列/index.md
    - LLaMA系列: 模型专区/LLaMA系列/index.md
    - DeepSeek: 模型专区/DeepSeek/index.md
    - Gemini系列: 模型专区/Gemini系列/index.md
    - Qwen系列: 模型专区/Qwen系列/index.md
    - Stable Diffusion: 模型专区/StableDiffusion/index.md
    - Mixtral系列: 模型专区/Mixtral系列/index.md
  - 🛠️ 工具专区:
    - 工具专区/index.md
    - LangChain: 工具专区/LangChain/index.md
    - AutoGPT: 工具专区/AutoGPT/index.md
    - ComfyUI: 工具专区/ComfyUI/index.md
    - vLLM: 工具专区/vLLM/index.md
    - HuggingFace: 工具专区/HuggingFace/index.md
    - PyTorch: 工具专区/PyTorch/index.md
    - TensorFlow: 工具专区/TensorFlow/index.md
    - Ollama: 工具专区/Ollama/index.md
